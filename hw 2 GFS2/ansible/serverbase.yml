---
- name: Тест подключения
  hosts: all
  tasks:
    - name: Пинг хоста
      ansible.builtin.ping:

- name: Install and confifuration ISCSI
  hosts: all
  gather_facts: true
  become: true
  roles:
    - iscsi
  

- name: Install and confifuration Pacemaker
  hosts: nodes
  gather_facts: true
  become: true
  roles:
    - gfs2
    - pacemaker
     